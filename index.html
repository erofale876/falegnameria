<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falegnameria Desantis – Gestione v2.4</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#17110a;--bg2:#1e1508;--bg3:#261c0b;--card:#1b1308;
  --bo:#3d2912;--bo2:#4e3518;
  --or:#e8692a;--or2:#ff7c3a;
  --tx:#d4c4a8;--tx2:#9a7a58;--tx3:#5a3820;
  --gn:#4ecb6e;--bl:#5aaee8;--rd:#d85040;
  --fn:'Share Tech Mono',monospace;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:13px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#0d0904;border-bottom:2px solid var(--or)}
.hdr h1{font-size:18px;color:var(--or);letter-spacing:1px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border-bottom:1px solid var(--bo2)}
.t-btn{padding:12px 5px;border:none;background:none;color:var(--tx2);font-family:var(--fn);font-weight:700;font-size:10px;text-transform:uppercase;cursor:pointer}
.t-btn.active{color:var(--or);border-bottom:2px solid var(--or);background:rgba(232,105,42,.05)}
main{max-width:1100px;margin:0 auto;padding:15px}
.panel{display:none} .panel.active{display:block}
.card{background:var(--card);border:1px solid var(--bo2);padding:15px;border-radius:4px;margin-bottom:15px}
.title{font-size:12px;color:var(--or);margin-bottom:12px;font-weight:700;text-transform:uppercase;border-left:3px solid var(--or);padding-left:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.f-gp{display:flex;flex-direction:column;gap:3px}
label{font-size:9px;color:var(--tx2);text-transform:uppercase}
input,select,textarea{background:var(--bg3);border:1px solid var(--bo2);padding:8px;color:var(--tx);font-family:var(--fn);border-radius:2px;width:100%}
.btn{background:var(--or);color:#fff;padding:10px;border:none;border-radius:2px;font-weight:700;cursor:pointer;width:100%;margin-top:5px}
.btn:active{transform:scale(0.98)}
.t-wrap{overflow-x:auto;border:1px solid var(--bo2);border-radius:3px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;min-width:600px}
th{padding:10px;text-align:left;color:var(--or);font-size:10px;background:#120d04;border-bottom:1px solid var(--bo2)}
td{padding:10px;border-bottom:1px solid var(--bo);color:var(--tx2);font-size:11px}
.pill{padding:2px 6px;border-radius:2px;font-size:9px;font-weight:700;background:rgba(255,255,255,0.05)}
#loading{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;color:var(--or)}
.hide{display:none}
@media (max-width:600px){ .row{grid-template-columns:1fr} }
</style>
</head>
<body>

<div id="loading" class="hide">CARICAMENTO...</div>

<header class="hdr">
  <h1>DESANTIS CLOUD v2.4</h1>
</header>

<nav class="tabs">
  <button class="t-btn active" onclick="tab('c',this)">Anagrafica</button>
  <button class="t-btn" onclick="tab('p',this)">Produzione</button>
  <button class="t-btn" onclick="tab('i',this)">Incassi</button>
  <button class="t-btn" onclick="tab('s',this)">Riepilogo</button>
</nav>

<main>
  <section id="p-c" class="panel active">
    <div class="card">
      <div class="title">Nuova Commessa</div>
      <div class="row">
        <div class="f-gp"><label>Cliente</label><input type="text" id="c_cli"></div>
        <div class="f-gp"><label>Tipo Lavoro</label><input type="text" id="c_lav"></div>
      </div>
      <div class="row">
        <div class="f-gp"><label>Valore €</label><input type="number" id="c_val" value="0"></div>
        <div class="f-gp"><label>Ore Previste</label><input type="number" id="c_ore" value="0"></div>
      </div>
      <button class="btn" onclick="saveCli()">SALVA CLIENTE</button>
    </div>
    <div class="t-wrap">
      <table><thead><tr><th>Cliente</th><th>Lavoro</th><th>Stato</th></tr></thead><tbody id="list-c"></tbody></table>
    </div>
  </section>

  <section id="p-p" class="panel">
    <div class="card">
      <div class="title">Registra Ore Lavoro</div>
      <div class="row">
        <div class="f-gp"><label>Seleziona Commessa</label><select id="p_cont"></select></div>
        <div class="f-gp"><label>Data</label><input type="date" id="p_data"></div>
      </div>
      <div class="row">
        <div class="f-gp"><label>Ore di oggi</label><input type="number" id="p_ore" step="0.5"></div>
        <div class="f-gp"><label>Avanzamento %</label><input type="number" id="p_ava" placeholder="0-100"></div>
      </div>
      <div class="row">
        <div class="f-gp"><label>Note Lavorazione</label><input type="text" id="p_prod" placeholder="Cosa hai fatto?"></div>
        <div class="f-gp"><label>Operatore</label><input type="text" id="p_oper" value="Titolare"></div>
      </div>
      <button class="btn" onclick="saveLav()">REGISTRA PRODUZIONE</button>
    </div>
    <div class="t-wrap">
      <table><thead><tr><th>Data</th><th>Cliente</th><th>Ore</th><th>Lavoro</th></tr></thead><tbody id="list-p"></tbody></table>
    </div>
  </section>

  <section id="p-i" class="panel">
    <div class="card">
      <div class="title">Registra Pagamento</div>
      <div class="row">
        <div class="f-gp"><label>Commessa</label><select id="i_cont"></select></div>
        <div class="f-gp"><label>Data</label><input type="date" id="i_data"></div>
      </div>
      <div class="row">
        <div class="f-gp"><label>Importo €</label><input type="number" id="i_val"></div>
        <div class="f-gp"><label>Metodo</label><input type="text" id="i_met" value="Bonifico"></div>
      </div>
      <button class="btn" onclick="saveInc()">SALVA INCASSO</button>
    </div>
  </section>

  <section id="p-s" class="panel">
    <div id="stat-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px"></div>
    <div class="t-wrap">
      <table><thead><tr><th>Cliente</th><th>Lavoro</th><th>Stato</th><th>Ore</th><th>Incasso</th></tr></thead><tbody id="list-s"></tbody></table>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUBA_URL = 'https://phqiutctunqiwqrqvtrd.supabase.co';
const SUBA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBocWl1dGN0dW5xaXdxcnF2dHJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgyNDcyNjksImV4cCI6MjA1MzgyNzI2OX0.jX-WVU8uNxSAVCzG6D8WXmDC0nFzP-hCPCrA3zK8-2c';
const sb = window.supabase.createClient(SUBA_URL, SUBA_KEY);

let CC=[], PP=[], UU=[];

async function init(){
  loader(true);
  document.getElementById('p_data').value = new Date().toISOString().split('T')[0];
  document.getElementById('i_data').value = new Date().toISOString().split('T')[0];
  await refresh();
  loader(false);
}

function loader(s){ document.getElementById('loading').classList.toggle('hide',!s); }

function tab(t, b){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.t-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  b.classList.add('active');
}

async function refresh(){
  const rC = await sb.from('contatti').select('*').order('cliente');
  const rP = await sb.from('produzione').select('*, contatti(cliente)').order('data',{ascending:false});
  const rU = await sb.from('incassi').select('*, contatti(cliente)').order('data',{ascending:false});
  
  CC = rC.data || []; PP = rP.data || []; UU = rU.data || [];
  
  render();
}

function render(){
  // Liste dropdown
  const opt = CC.map(c=>`<option value="${c.id}">${c.cliente} - ${c.tipo_lavoro}</option>`).join('');
  document.getElementById('p_cont').innerHTML = opt;
  document.getElementById('i_cont').innerHTML = opt;

  // Tabella Anagrafica
  document.getElementById('list-c').innerHTML = CC.map(c=>`<tr><td>${c.cliente}</td><td>${c.tipo_lavoro}</td><td><span class="pill">${c.stato}</span></td></tr>`).join('');

  // Tabella Produzione
  document.getElementById('list-p').innerHTML = PP.map(p=>`<tr><td>${p.data}</td><td>${p.contatti?.cliente || '???'}</td><td>${p.ore_lavorate}h</td><td>${p.prodotto || ''}</td></tr>`).join('');

  // Riepilogo
  let tOre = PP.reduce((s,p)=>s+Number(p.ore_lavorate||0),0);
  let tInc = UU.reduce((s,i)=>s+Number(i.incasso||0),0);
  document.getElementById('stat-grid').innerHTML = `
    <div class="card" style="text-align:center"><div style="font-size:10px;color:var(--tx2)">ORE TOTALI</div><div style="font-size:18px;color:var(--or)">${tOre}h</div></div>
    <div class="card" style="text-align:center"><div style="font-size:10px;color:var(--tx2)">TOT. INCASSATO</div><div style="font-size:18px;color:var(--gn)">€${tInc}</div></div>
  `;
}

async function saveCli(){
  const cli = document.getElementById('c_cli').value;
  if(!cli) return alert("Inserisci il nome cliente");
  loader(true);
  const {error} = await sb.from('contatti').insert({
    cliente: cli,
    tipo_lavoro: document.getElementById('c_lav').value,
    valore: parseFloat(document.getElementById('c_val').value)||0,
    ore_previste: parseFloat(document.getElementById('c_ore').value)||0,
    stato: 'In Corso'
  });
  if(error) alert("Errore: " + error.message);
  else { alert("Cliente salvato!"); await refresh(); }
  loader(false);
}

async function saveLav(){
  const id = document.getElementById('p_cont').value;
  const ore = document.getElementById('p_ore').value;
  if(!id || !ore) return alert("Manca Cliente o Ore");
  
  loader(true);
  // Cerchiamo di scrivere nella tabella produzione
  const {error} = await sb.from('produzione').insert({
    contatto_id: parseInt(id),
    data: document.getElementById('p_data').value,
    prodotto: document.getElementById('p_prod').value,
    operatore: document.getElementById('p_oper').value,
    ore_lavorate: parseFloat(ore)||0,
    avanzamento: parseInt(document.getElementById('p_ava').value)||0
  });

  if(error){
    console.error(error);
    alert("ERRORE SUPABASE: " + error.message + "\nControlla se la colonna 'prodotto' o 'operatore' esiste.");
  } else {
    alert("Produzione registrata!");
    document.getElementById('p_ore').value = '';
    await refresh();
  }
  loader(false);
}

async function saveInc(){
  const id = document.getElementById('i_cont').value;
  const val = document.getElementById('i_val').value;
  if(!id || !val) return alert("Manca Cliente o Importo");
  loader(true);
  const {error} = await sb.from('incassi').insert({
    contatto_id: parseInt(id),
    data: document.getElementById('i_data').value,
    incasso: parseFloat(val)||0,
    metodo: document.getElementById('i_met').value
  });
  if(error) alert("Errore: " + error.message);
  else { alert("Incasso registrato!"); await refresh(); }
  loader(false);
}

init();
</script>
</body>
</html>
